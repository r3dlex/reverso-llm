name: AI SDLC Pre-commit Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  _prek-check-self-hosted:
    name: "Pre-commit Hooks (self-hosted)"
    runs-on: [self-hosted, ubuntu-latest]
    timeout-minutes: 30
    continue-on-error: true
    outputs:
      passed: ${{ steps.mark.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install prek
        run: pip install prek
      - name: Run prek
        run: prek run --all-files
      - name: Validate .rules.ts
        run: bash scripts/validate-rules.sh
      - name: Archgate structural check
        run: bash scripts/archgate.sh structural .rules.ts
      - id: mark
        if: success()
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  prek-check:
    name: Pre-commit Hooks
    needs: _prek-check-self-hosted
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Route
        run: echo "self-hosted passed=${{ needs._prek-check-self-hosted.outputs.passed }}"
      - name: Checkout
        if: needs._prek-check-self-hosted.outputs.passed != 'true'
        uses: actions/checkout@v4
      - name: Install prek
        if: needs._prek-check-self-hosted.outputs.passed != 'true'
        run: pip install prek
      - name: Run prek
        if: needs._prek-check-self-hosted.outputs.passed != 'true'
        run: prek run --all-files
      - name: Validate .rules.ts
        if: needs._prek-check-self-hosted.outputs.passed != 'true'
        run: bash scripts/validate-rules.sh
      - name: Archgate structural check
        if: needs._prek-check-self-hosted.outputs.passed != 'true'
        run: bash scripts/archgate.sh structural .rules.ts
