# LiteLLM proxy configuration for the Reverso gateway.
# This file is passed to LiteLLM by the reverso-proxy entrypoint.
#
# Codex profile paths are supported by reverso.proxy.profile_routing:
#   /deepseek/v1 maps GPT-level names to DeepSeek-V4-Pro or DeepSeek-V4-Flash
#   /claude/v1   maps GPT-level names to Claude Opus or Claude Sonnet
# MiniMax is direct Codex-only and is not routed through Reverso.

# Drop Codex/Responses-style extras that OpenAI-compatible upstreams reject.
_codex_drop_params: &codex_drop_params
  - client_metadata
  - web_search_options
  - metadata
  - service_tier
  - reasoning_effort
  - stream_options
  - store
  - include
  - prompt_cache_key
  - safety_identifier
  - truncation
  - text
  - response_format
  - context_management

model_list:
  # Anthropic / Claude Code (cli-wrapped)
  - model_name: claude-opus-4-8
    litellm_params:
      model: custom/claude-opus-4-8
      custom_llm_provider: anthropic_cli

  - model_name: claude-opus
    litellm_params:
      model: custom/claude-opus-4-8
      custom_llm_provider: anthropic_cli

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli

  - model_name: claude-sonnet
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli

  - model_name: claude
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli

  - model_name: claude-haiku-4-6
    litellm_params:
      model: custom/claude-haiku-4-6
      custom_llm_provider: anthropic_cli

  - model_name: claude-haiku
    litellm_params:
      model: custom/claude-haiku-4-6
      custom_llm_provider: anthropic_cli

  # OpenAI / Codex CLI (cli-wrapped)
  - model_name: gpt-5.5
    litellm_params:
      model: custom/gpt-5.5
      custom_llm_provider: openai_cli

  - model_name: gpt-5.4
    litellm_params:
      model: custom/gpt-5.4
      custom_llm_provider: openai_cli

  - model_name: gpt-5.4-mini
    litellm_params:
      model: custom/gpt-5.4-mini
      custom_llm_provider: openai_cli

  - model_name: gpt-5.3-codex-spark
    litellm_params:
      model: custom/gpt-5.3-codex-spark
      custom_llm_provider: openai_cli

  - model_name: gpt-4.1
    litellm_params:
      model: custom/gpt-4.1
      custom_llm_provider: openai_cli

  # DeepSeek (http-forwarded)
  # DEPRECATED (ADR 0003): these LiteLLM DeepSeek entries are superseded by the
  # first-party DeepSeekAdapter (src/reverso/protocols/adapters/deepseek.py),
  # which serves /deepseek through the composition root and does NOT inherit
  # _codex_drop_params, so response_format (JSON mode) and reasoning_content
  # (thinking mode) survive. They are retained ONLY as the rollback path: if
  # reverso/proxy/main.py is repointed back to reverso.proxy.app:app, profile
  # routing falls back onto these LiteLLM entries with no data migration. Do not
  # remove them while the rollback path is supported.
  - model_name: deepseek-v4-pro
    litellm_params:
      model: custom_openai/deepseek-v4-pro
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
      additional_drop_params: *codex_drop_params

  - model_name: deepseek-v4-flash
    litellm_params:
      model: custom_openai/deepseek-v4-flash
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
      additional_drop_params: *codex_drop_params

  - model_name: deepseek-reasoner
    litellm_params:
      model: custom_openai/deepseek-reasoner
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
      additional_drop_params: *codex_drop_params

  - model_name: deepseek-chat
    litellm_params:
      model: custom_openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
      additional_drop_params: *codex_drop_params


litellm_settings:
  drop_params: true

general_settings:
  master_key: "os.environ/REVERSO_MASTER_KEY"
  port: 64946
  host: "127.0.0.1"

# DEEPSEEK_API_KEY is injected from macOS Keychain (reverso/DEEPSEEK_API_KEY)
# by reverso.proxy.main at startup. Do NOT redeclare it under LiteLLM's
# environment_variables section: LiteLLM writes those values into os.environ
# at config load, and an empty placeholder blanks the injected key for the
# first-party adapters that read it at call time.
