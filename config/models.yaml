# Reverso model registry in LiteLLM model_list format.
#
# Reverso supports provider-profile paths for Codex:
#   /minimax/v1, /deepseek/v1, /claude/v1
# Those paths let Codex profiles keep GPT-level model names while Reverso
# rewrites them to concrete provider model ids internally.

model_list:
  # Anthropic / Claude Code (cli-wrapped)
  - model_name: claude-opus-4-8
    litellm_params:
      model: custom/claude-opus-4-8
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Claude Opus 4.8 via Claude Code CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: claude
      aliases:
        - claude-opus

  - model_name: claude-opus
    litellm_params:
      model: custom/claude-opus-4-8
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Alias for claude-opus-4-8"
      provider_kind: cli-wrapped
      cli: claude

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Claude Sonnet 4.6 via Claude Code CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: claude
      aliases:
        - claude-sonnet
        - claude

  - model_name: claude-sonnet
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Alias for claude-sonnet-4-6"
      provider_kind: cli-wrapped
      cli: claude

  - model_name: claude
    litellm_params:
      model: custom/claude-sonnet-4-6
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Alias for claude-sonnet-4-6"
      provider_kind: cli-wrapped
      cli: claude

  - model_name: claude-haiku-4-6
    litellm_params:
      model: custom/claude-haiku-4-6
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Claude Haiku 4.6 via Claude Code CLI for very simple profile aliases"
      provider_kind: cli-wrapped
      cli: claude
      aliases:
        - claude-haiku

  - model_name: claude-haiku
    litellm_params:
      model: custom/claude-haiku-4-6
      custom_llm_provider: anthropic_cli
    model_info:
      description: "Alias for claude-haiku-4-6"
      provider_kind: cli-wrapped
      cli: claude

  # OpenAI / Codex CLI (cli-wrapped)
  - model_name: gpt-5.5
    litellm_params:
      model: custom/gpt-5.5
      custom_llm_provider: openai_cli
    model_info:
      description: "GPT-5.5 via Codex CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: codex

  - model_name: gpt-5.4
    litellm_params:
      model: custom/gpt-5.4
      custom_llm_provider: openai_cli
    model_info:
      description: "GPT-5.4 via Codex CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: codex

  - model_name: gpt-5.4-mini
    litellm_params:
      model: custom/gpt-5.4-mini
      custom_llm_provider: openai_cli
    model_info:
      description: "GPT-5.4 mini via Codex CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: codex

  - model_name: gpt-5.3-codex-spark
    litellm_params:
      model: custom/gpt-5.3-codex-spark
      custom_llm_provider: openai_cli
    model_info:
      description: "GPT-5.3 Codex Spark via Codex CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: codex

  - model_name: gpt-4.1
    litellm_params:
      model: custom/gpt-4.1
      custom_llm_provider: openai_cli
    model_info:
      description: "GPT-4.1 via Codex CLI (subscription-backed)"
      provider_kind: cli-wrapped
      cli: codex

  # DeepSeek (http-forwarded)
  - model_name: deepseek-v4-pro
    litellm_params:
      model: custom_openai/deepseek-v4-pro
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
    model_info:
      description: "DeepSeek-V4-Pro for frontier GPT-level aliases"
      provider_kind: http-forwarded

  - model_name: deepseek-v4-flash
    litellm_params:
      model: custom_openai/deepseek-v4-flash
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
    model_info:
      description: "DeepSeek-V4-Flash for non-frontier GPT-level aliases"
      provider_kind: http-forwarded

  - model_name: deepseek-reasoner
    litellm_params:
      model: custom_openai/deepseek-reasoner
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
    model_info:
      description: "DeepSeek reasoner legacy direct alias"
      provider_kind: http-forwarded

  - model_name: deepseek-chat
    litellm_params:
      model: custom_openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"
    model_info:
      description: "DeepSeek chat legacy direct alias"
      provider_kind: http-forwarded

  # MiniMax (http-forwarded)
  - model_name: MiniMax-M3
    litellm_params:
      model: custom_openai/MiniMax-M3
      api_base: https://api.minimax.io/v1
      api_key: "os.environ/MINIMAX_API_KEY"
    model_info:
      description: "MiniMax-M3 for all MiniMax GPT-level aliases"
      provider_kind: http-forwarded
      aliases:
        - minimax

  - model_name: minimax
    litellm_params:
      model: custom_openai/MiniMax-M3
      api_base: https://api.minimax.io/v1
      api_key: "os.environ/MINIMAX_API_KEY"
    model_info:
      description: "Alias for MiniMax-M3"
      provider_kind: http-forwarded
