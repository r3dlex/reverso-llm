# prek.toml — pre-commit hook configuration for reverso
# See https://prek.j178.dev/ for documentation.

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
  { id = "check-yaml", pass_filenames = false },
  { id = "check-json", pass_filenames = false },
  { id = "check-toml", pass_filenames = false },
  { id = "check-merge-conflict", pass_filenames = false },
  { id = "end-of-file-fixer", pass_filenames = false },
  { id = "trailing-whitespace", pass_filenames = false },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.6.0"
hooks = [
  { id = "ruff", args = ["--fix"], pass_filenames = false },
  { id = "ruff-format", pass_filenames = false },
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-mypy"
rev = "v1.11.0"
hooks = [
  # pass_filenames = false so we control the target list; point mypy at the
  # actual package source. Without args, mypy exits with "Missing target
  # module, package, files, or command."
  { id = "mypy", pass_filenames = false, args = ["src/reverso"], additional_dependencies = ["types-PyYAML", "types-python-dateutil"] },
]
